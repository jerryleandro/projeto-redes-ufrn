services:
  tenant1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenant1
    volumes:
      - ./tenant1/index.html:/usr/share/nginx/html/index.html
    expose:
      - "7000"

  tenant2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenant2
    volumes:
      - ./tenant2/index.html:/usr/share/nginx/html/index.html
    expose:
      - "7000"

  gateway:
    image: nginx:latest
    container_name: gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tenant1
      - tenant2